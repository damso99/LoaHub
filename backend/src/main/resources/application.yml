server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loahub}?sslmode=require
    username: ${DB_USER:loahub}
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: -1
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.loahub
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30

loahub:
  lostark:
    connect-timeout-ms: 15000
    read-timeout-ms: 60000
  calendar:
    query-timeout-seconds: 30

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

lostark:
  api:
    key: ${LOSTARK_API_KEY:}

discord:
  client-id: ${DISCORD_CLIENT_ID:}
  client-secret: ${DISCORD_CLIENT_SECRET:}
  redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:8080/api/auth/discord/callback}
